<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirect — nicapotato</title>
  </head>
  <body style="font-family: system-ui, sans-serif; padding: 2rem; background: #0f1114; color: #e8eaed">
    <p>
      <a href="games/released/play.html" style="color: #6eb5ff">Continue to play page</a>
    </p>
    <script>
      (function () {
        var u = new URL(window.location.href);
        var mat = u.searchParams.get("maturity");
        u.searchParams.delete("maturity");
        var folder = mat === "prototype" ? "prototype" : "released";
        var qs = u.searchParams.toString();
        window.location.replace(
          "games/" + folder + "/play.html" + (qs ? "?" + qs : "") + (u.hash || "")
        );
      })();
    </script>
  </body>
</html>
