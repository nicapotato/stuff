<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirect — nicapotato</title>
    <meta http-equiv="refresh" content="0; url=../index.html?category=apps" />
  </head>
  <body style="font-family: system-ui, sans-serif; padding: 2rem; background: #0f1114; color: #e8eaed">
    <p>
      Redirecting to <a href="../index.html?category=apps" style="color: #6eb5ff">Catalog (apps)</a>…
    </p>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);
        p.set("category", "apps");
        var qs = p.toString();
        window.location.replace("../index.html" + (qs ? "?" + qs : "") + window.location.hash);
      })();
    </script>
  </body>
</html>
