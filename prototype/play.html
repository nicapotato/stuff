<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moved — nicapotato</title>
  </head>
  <body style="font-family: system-ui, sans-serif; padding: 2rem; background: #0f1114; color: #e8eaed">
    <p>
      <a href="../games/prototype/play.html" style="color: #6eb5ff">Open play page</a>
      (prototype builds live under <code>games/prototype/play.html</code>).
    </p>
    <script>
      (function () {
        var u = new URL(window.location.href);
        u.searchParams.delete("maturity");
        var qs = u.searchParams.toString();
        window.location.replace(
          "../games/prototype/play.html" + (qs ? "?" + qs : "") + (u.hash || "")
        );
      })();
    </script>
  </body>
</html>
