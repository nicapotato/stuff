<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moved — nicapotato</title>
  </head>
  <body style="font-family: system-ui, sans-serif; padding: 2rem; background: #0f1114; color: #e8eaed">
    <p>
      <a href="../games/play.html" style="color: #6eb5ff">Open play page</a>
      (add <code>?maturity=prototype</code> if needed).
    </p>
    <script>
      var u = new URL(window.location.href);
      if (!u.searchParams.get("maturity")) u.searchParams.set("maturity", "prototype");
      window.location.replace("../games/play.html" + u.search + (u.hash || ""));
    </script>
  </body>
</html>
