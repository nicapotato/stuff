<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototype — nicapotato</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="wrap wrap--catalog">
      <nav class="site-nav" aria-label="Catalog sections">
        <a href="../index.html">Released</a>
        <a href="./index.html" class="active">Prototype</a>
      </nav>
      <header>
        <h1>Prototype</h1>
      </header>
      <div id="status" class="banner" hidden></div>
      <div id="catalog-toolbar" class="catalog-toolbar" hidden></div>
      <div class="table-scroll">
        <table class="catalog-table">
          <thead>
            <tr>
              <th>Software</th>
              <th>Version</th>
              <th>Platform</th>
              <th>Released</th>
              <th>SHA-256</th>
              <th>Download</th>
              <th>Play</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
    <script>
      window.__STUFF_CATALOG_URL__ =
        "https://prod-nicapotato-public-software.s3.eu-west-2.amazonaws.com/prototype/games/catalog.json";
      window.__STUFF_PAGE_KIND__ = "prototype";
    </script>
    <script src="../catalog.js"></script>
  </body>
</html>
